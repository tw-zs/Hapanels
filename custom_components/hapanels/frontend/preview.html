<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hapanels Studio Preview</title>
    <style>
      body { margin: 0; background: #080b0f; font-family: system-ui, sans-serif; }
      .preview-bar { position: sticky; top: 0; z-index: 10; display: flex; gap: 10px; align-items: center; padding: 10px 14px; background: #111821; color: #f5f3ee; border-bottom: 1px solid rgba(255,255,255,.10); }
      .preview-bar button { border: 0; border-radius: 10px; padding: 8px 12px; font-weight: 800; background: #ff7a1a; color: #1a0d03; cursor: pointer; }
      .preview-bar .secondary { background: #202a36; color: #f5f3ee; border: 1px solid rgba(255,255,255,.10); }
      .preview-bar small { color: #a7adb8; }
    </style>
  </head>
  <body>
    <div class="preview-bar">
      <strong>Local preview</strong>
      <button id="reset-preview" class="secondary">Reset mock data</button>
      <small>Start: <code>python3 -m http.server 8124</code>, open <code>http://localhost:8124/preview.html</code></small>
    </div>
    <hapanels-studio-panel></hapanels-studio-panel>

    <script>
      class HaIconPreview extends HTMLElement {
        static get observedAttributes() { return ["icon"]; }
        connectedCallback() { this.render(); }
        attributeChangedCallback() { this.render(); }
        render() {
          const icon = this.getAttribute("icon") || "mdi:cog";
          this.style.display = "inline-grid";
          this.style.placeItems = "center";
          this.style.width = "var(--mdc-icon-size, 32px)";
          this.style.height = "var(--mdc-icon-size, 32px)";
          this.style.fontWeight = "900";
          this.style.fontSize = "calc(var(--mdc-icon-size, 32px) * .45)";
          this.textContent = icon.split(":").pop().slice(0, 2).toUpperCase();
          this.title = icon;
        }
      }
      customElements.define("ha-icon", HaIconPreview);
    </script>
    <script src="./hapanels-panel.js"></script>
    <script>
      const STORAGE_KEY = "hapanels_preview_config_1280x800";
      const PANEL_DEVICE = "preview-wall-tablet";
      const sampleConfig = {
        version: 2,
        dashboard_id: "home-panel-main",
        revision: 130,
        updated_by: "local-preview",
        title: "Panel domowy",
        layout: { type: "fixed_grid", columns_landscape: 3, columns_portrait: 2, columns: 12, rows: 9, gap: "medium" },
        always_on_display: {
          enabled: true,
          layout: "minimal_clock",
          timeout_sec: 300,
          brightness_percent: 3,
          background: "#000000",
          grid_layout: { type: "fixed_grid", columns_landscape: 3, columns_portrait: 2, columns: 12, rows: 9, gap: "small" },
          tiles: [
            { id: "aod_clock", kind: "clock", size: "large", label: "Zegar", icon: "mdi:clock", accent: "white", order: 0 },
            { id: "aod_temp", kind: "entity", size: "small", label: "Temperatura", entity_id: "sensor.outside_temperature", icon: "mdi:home-thermometer", accent: "orange", order: 1 }
          ]
        },
        people: [
          { id: "person.michal", name: "Michał", state: "poza domem", status: "away" },
          { id: "person.bartek", name: "Bartek", state: "poza domem", status: "away" },
          { id: "person.marcin", name: "Marcin", state: "nieznany", status: "unknown" },
          { id: "person.tomek", name: "Tomek", state: "w domu", status: "home" }
        ],
        tiles: [
          { id: "all_lights_off", kind: "action", size: "action", label: "Zgaś wszystko", icon: "mdi:lightbulb-off", accent: "white", order: 0, col: 1, row: 1, colSpan: 4, rowSpan: 2, tap_action: { type: "none" } },
          { id: "alarm_settings", kind: "action", size: "action", label: "Ustawienia alarmu", short_label: "Alarm", icon: "mdi:shield-lock", accent: "white", order: 1, col: 9, row: 1, colSpan: 2, rowSpan: 2, tap_action: { type: "none" } },
          { id: "climate", kind: "entity", size: "action", label: "Klimat", entity_id: "climate.home", icon: "mdi:home-thermometer", accent: "orange", order: 2, col: 11, row: 1, colSpan: 2, rowSpan: 2 },
          { id: "lamp", kind: "entity", size: "large", label: "Lampa", entity_id: "light.kitchen", icon: "mdi:lightbulb", accent: "orange", order: 10, col: 1, row: 3, colSpan: 4, rowSpan: 3 },
          { id: "lights", kind: "folder", size: "large", label: "Oświetlenie", panel_id: "lights-panel", icon: "mdi:lightbulb-group", accent: "orange", order: 11, col: 5, row: 3, colSpan: 4, rowSpan: 3 },
          { id: "covers", kind: "cover", size: "large", label: "Rolety", entity_id: "cover.all_covers", icon: "mdi:blinds", accent: "orange", order: 12, col: 9, row: 3, colSpan: 4, rowSpan: 3, cover_visual: "blind", cover_direction: "top" },
          { id: "cameras", kind: "camera", size: "large", label: "hrj/kamera", entity_id: "camera.front", icon: "mdi:cctv", accent: "orange", order: 13, col: 1, row: 6, colSpan: 4, rowSpan: 3 },
          { id: "gate", kind: "cover", size: "large", label: "Brama", entity_id: "cover.gate", icon: "mdi:gate", accent: "orange", order: 14, col: 5, row: 6, colSpan: 4, rowSpan: 4 },
          { id: "energy", kind: "entity", size: "small", label: "Energia", entity_id: "sensor.home_power", icon: "mdi:home-lightning-bolt", accent: "white", order: 20, col: 9, row: 6, colSpan: 2, rowSpan: 2 },
          { id: "settings", kind: "action", size: "small", label: "Otwórz ustawienia", short_label: "Ustawienia", icon: "mdi:cog", accent: "white", order: 21, col: 11, row: 6, colSpan: 2, rowSpan: 2, tap_action: { type: "navigate", destination: "settings" } }
        ],
        panels: [{
          id: "lights-panel",
          title: "Oświetlenie",
          layout: { type: "fixed_grid", columns_landscape: 3, columns_portrait: 2, columns: 12, rows: 9, gap: "medium" },
          tiles: [
            { id: "living-room-light", kind: "entity", size: "large", label: "Salon", entity_id: "light.living_room", icon: "mdi:ceiling-light", accent: "orange", order: 0, col: 1, row: 1, colSpan: 4, rowSpan: 3, tap_action: { type: "entity_default", entity_id: "light.living_room" } }
          ]
        }],
        camera_actions: ["Lista kamer", "Pełny ekran"]
      };

      function loadConfig() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || JSON.stringify(sampleConfig));
      }

      function saveConfig(config) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      }

      const hass = {
        themes: { darkMode: true },
        states: {
          "light.kitchen": { attributes: { friendly_name: "Lampa", icon: "mdi:lightbulb" } },
          "light.living_room": { attributes: { friendly_name: "Salon", icon: "mdi:ceiling-light" } },
          "group.all_lights": { attributes: { friendly_name: "Oświetlenie", icon: "mdi:lightbulb-group" } },
          "cover.all_covers": { state: "open", attributes: { friendly_name: "Rolety", icon: "mdi:blinds", current_position: 64 } },
          "climate.home": { attributes: { friendly_name: "Klimat", icon: "mdi:home-thermometer" } },
          "camera.front": { attributes: { friendly_name: "hrj/kamera", icon: "mdi:cctv" } },
          "cover.gate": { state: "closed", attributes: { friendly_name: "Brama", icon: "mdi:gate", current_position: 0 } },
          "sensor.home_power": { attributes: { friendly_name: "Energia", icon: "mdi:home-lightning-bolt" } }
        },
        async callWS(message) {
          if (message.type === "hapanels/list_panels") {
            const config = loadConfig();
            return { panels: [{ device: PANEL_DEVICE, panel_name: "Tablet testowy", status: "synced", dashboard_id: config.dashboard_id, revision: config.revision, updated_by: config.updated_by, schema_version: 2, schema_capabilities: ["panels", "presentation", "text", "spacer", "tap_action", "technical_actions"], supported_tile_kinds: TILE_KINDS, supported_action_types: ACTION_TYPES, screen_resolution: "1280x800", screen_width_px: 1280, screen_height_px: 800 }] };
          }
          if (message.type === "hapanels/get_dashboard_config") return { config: loadConfig(), pending_patch: null };
          throw new Error(`Unsupported mock WS: ${message.type}`);
        },
        async callService(domain, service, data) {
          if (domain !== "hapanels") throw new Error(`Unsupported mock service: ${domain}.${service}`);
          const config = loadConfig();
          if (service === "set_dashboard_config") {
            saveConfig(data.config);
            return;
          }
          if (service === "patch_dashboard_config") {
            const patch = data.patch || {};
            const target = patch.surface === "aod" ? (config.always_on_display ||= {}) : config;
            const updates = new Map((patch.tile_updates || []).map((tile) => [tile.id, tile]));
            target.tiles = (target.tiles || []).map((tile) => updates.has(tile.id) ? { ...tile, ...updates.get(tile.id) } : tile);
            if (patch.surface !== "aod") config.panels = (config.panels || []).map((panel) => ({ ...panel, tiles: (panel.tiles || []).map((tile) => updates.has(tile.id) ? { ...tile, ...updates.get(tile.id) } : tile) }));
            config.revision = Number(config.revision || 0) + 1;
            config.updated_by = patch.updated_by || "local-preview";
            saveConfig(config);
            return;
          }
          if (service === "accept_tablet_config") return;
          throw new Error(`Unsupported mock service: hapanels.${service}`);
        }
      };

      document.getElementById("reset-preview").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      });

      document.querySelector("hapanels-studio-panel").hass = hass;
    </script>
  </body>
</html>
