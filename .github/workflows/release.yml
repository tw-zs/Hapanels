name: Release

on:
  push:
    tags:
      # Accept either the legacy date-only form (r1ha-YYYYMMDD) or the new
      # date + UTC time-of-day form (r1ha-YYYYMMDD-HHmm) so same-day reships
      # produce strictly distinct versionNames / versionCodes.
      - 'r1ha-[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
      - 'r1ha-[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9][0-9]'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          # Tag forms: r1ha-YYYYMMDD or r1ha-YYYYMMDD-HHmm. We always parse a
          # date AND a time; the legacy date-only form defaults to 0000 UTC so
          # the resulting versionName / versionCode are stable across the
          # one-tag-per-day historical regime. The versionCode is minutes-since-
          # 2020-01-01-UTC — strictly monotonic with wall-clock time so any
          # reship within the same day produces a higher code than the previous.
          TAG="${GITHUB_REF_NAME}"
          REST="${TAG#r1ha-}"
          YYYYMMDD="${REST:0:8}"
          if [ "${#REST}" -ge 13 ] && [ "${REST:8:1}" = "-" ]; then
            HHMM="${REST:9:4}"
          else
            HHMM="0000"
          fi
          YYYY="${YYYYMMDD:0:4}"
          MM="${YYYYMMDD:4:2}"
          DD="${YYYYMMDD:6:2}"
          HH="${HHMM:0:2}"
          MIN="${HHMM:2:2}"
          # Compute minutes since 2020-01-01 UTC using `date -d` so the math is
          # locale-safe; subtract the epoch from the tag's UTC moment. Add a 100M
          # floor so the result stays strictly above every legacy YYYYMMDD-as-Int
          # value we ever shipped — without that floor, the new scheme (~3.3M for
          # mid-2026) would land BELOW the previous date-as-int (~20.2M) and
          # Android would refuse the upgrade with "App not installed as package
          # appears to be invalid" (which is its generic message for downgrade).
          EPOCH_S=$(date -u -d '2020-01-01 00:00:00' +%s)
          TAG_S=$(date -u -d "${YYYY}-${MM}-${DD} ${HH}:${MIN}:00" +%s)
          MINUTES=$(( (TAG_S - EPOCH_S) / 60 ))
          VERSION_CODE=$(( 100000000 + MINUTES ))
          VERSION_NAME="${YYYY}.${MM}.${DD}.${HHMM}"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs (both flavours)
        env:
          APP_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          APP_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        # Two product flavours land in this workflow:
        #   - github  → default; ships with the in-app self-updater (the APK this
        #               same workflow attaches to GitHub Releases and the in-app
        #               updater downloads on tap).
        #   - fdroid  → strips the self-updater UI and the REQUEST_INSTALL_PACKAGES
        #               permission. Mirror-ready for IzzyOnDroid and f-droid.org so
        #               users on those catalogs get a single update path through the
        #               catalog client.
        # Both share the same applicationId / versionCode / versionName so they
        # register as the same Android app.
        run: ./gradlew :app:assembleGithubDebug :app:assembleFdroidDebug

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/github/debug/app-github-debug.apk \
             "r1ha-${{ steps.version.outputs.version_name }}.apk"
          mv app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk \
             "r1ha-fdroid-${{ steps.version.outputs.version_name }}.apk"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^r1ha-' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s")
          else
            NOTES=$(git log --pretty=format:"- %s")
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            r1ha-${{ steps.version.outputs.version_name }}.apk
            r1ha-fdroid-${{ steps.version.outputs.version_name }}.apk
