    <rect x="625" y="445" width="150" height="132" rx="28" fill="url(#tile)"/>
    <rect x="625" y="608" width="150" height="132" rx="28" fill="url(#tile)"/>
  </g>
  <g font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif" font-size="150" font-weight="650" letter-spacing="-8">
