<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Hapanels logo</title>
  <desc id="desc">A house-shaped wall panel outline with three blue dashboard tiles and the Hapanels wordmark.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f9bff"/>
      <stop offset="1" stop-color="#227fe8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#172232" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" rx="120" fill="#f8fbff"/>
  <g filter="url(#softShadow)">
    <path d="M365 690V430c0-42 19-82 52-108l136-106c28-22 67-22 95 0l136 106c33 26 52 66 52 108v260" fill="none" stroke="#172232" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
